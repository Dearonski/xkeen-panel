# Порт веб-панели
port: 3000

# Папка для данных (user.json, subscription.json)
data_dir: /opt/etc/xkeen-panel/data

# === Пути XKeen/Xray ===
xkeen_path: /opt/sbin/xkeen
outbounds_file: /opt/etc/xray/configs/04_outbounds.json
init_script: /opt/etc/init.d/S24xray

# === Watchdog ===
check_interval: 120        # Интервал проверки в секундах
check_url: https://www.google.com
max_fails: 3               # Фейлов подряд до переключения

# Лог-файл watchdog'а
log_file: /opt/var/log/xkeen-panel.log

# === Автопилот ===
probe_timeout_ms: 2000          # Таймаут TCP-пинга сервера
probe_concurrency: 20           # Лимит одновременных пингов (важно для роутера)
latency_auto_switch: true       # Переключаться при высоком пинге, а не только при обрыве
latency_threshold_ms: 1000      # Порог высокого пинга
latency_switch_count: 3         # Сколько проверок подряд выше порога до переключения
blacklist_ttl_sec: 300          # На сколько исключать сервер после фейловера
watchdog_auto_start: true       # Включать watchdog автоматически при старте

# Автообновление подписки (секунды, 0 = выключено)
subscription_refresh_interval: 21600

# === Гео-избегание при автопереключении ===
# Используем geoip.dat, который уже стоит для Xray
geoip_path: /opt/etc/xray/dat/geoip_v2fly.dat
auto_switch_avoid_countries:    # Не переключаться автоматически на серверы этих стран
  - RU
  - BY

# Доверять заголовкам прокси (X-Forwarded-For/Host/Proto). Включай ТОЛЬКО если
# панель за доверенным HTTPS-прокси, который их перезаписывает. Влияет на
# rate-limit (иначе IP можно подделать) и на автовывод RP для passkey.
trust_proxy_headers: false

# === Passkey (WebAuthn) ===
# Для passkey нужен HTTPS-домен. Задай RP ID и origins явно (надёжнее всего):
# webauthn_rp_id: xkeen.superwifi.netcraze.link
# webauthn_rp_name: XKeen Panel
# webauthn_origins:
#   - https://xkeen.superwifi.netcraze.link
# Либо, если домен задать нельзя — включи trust_proxy_headers: true, и RP
# выведется из X-Forwarded-Host/Proto (только за доверенным прокси!).
